dev:
  default: true
  output: development.env
  extends:
    - dotenv:secrets*.env
    - staging
  env:
    HOST: localhost

staging:
  extends:
    - prod
    - dotenv:secrets.env
  env:
    HOST: staging.example.com
    DEBUG: true
    STAGES: false

prod:
  extends:
    - dotenv:secrets2.env
  env:
    HOST: prod.example.com
    PORT: 80
    DEBUG: false

active:
  env:
    HOST: localhost

compared:
  env:
    HOST: localhosts
    BROKER: localhost:9092
